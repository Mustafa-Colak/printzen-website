<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Printzen — Lisansı Aktive Et</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function getKey() {
      return new URLSearchParams(window.location.search).get('key') || '';
    }
    function openInApp() {
      var key = getKey();
      window.location.href = 'mps://activate?key=' + encodeURIComponent(key);
    }
    window.onload = function() {
      var key = getKey();
      if (key) {
        document.getElementById('keyDisplay').textContent = key;
        document.getElementById('openBtn').onclick = openInApp;
        // Mobil cihazda otomatik dene
        if (/android/i.test(navigator.userAgent)) {
          setTimeout(openInApp, 500);
        }
      }
    };
  </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="text-center px-4 max-w-md">
    <div class="text-5xl mb-6">🔑</div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Lisansı Aktive Et</h1>
    <p class="text-gray-500 mb-6">Aşağıdaki butona basarak Mobile Print Service uygulamasında lisansınızı aktive edin.</p>
    <div class="bg-gray-100 rounded-xl px-4 py-3 mb-6 font-mono text-lg tracking-widest text-gray-800" id="keyDisplay"></div>
    <button id="openBtn"
      class="bg-blue-600 text-white px-8 py-4 rounded-xl text-lg font-semibold hover:bg-blue-700 transition w-full shadow-lg">
      Uygulamada Aç &amp; Aktive Et
    </button>
    <p class="text-sm text-gray-400 mt-6">Uygulama yüklü değilse <a href="/MobilePrintService.apk" class="text-blue-600 hover:underline">önce indirin</a>.</p>
    <p class="mt-4"><a href="/" class="text-blue-600 hover:underline text-sm">← printzen.app</a></p>
  </div>
</body>
</html>
